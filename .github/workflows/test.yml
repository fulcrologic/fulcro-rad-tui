name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clj:
    name: Clojure tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: '1.12.0.1530'
      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure
            ~/.cpcache
          key: ${{ runner.os }}-clj-${{ hashFiles('**/deps.edn') }}
          restore-keys: ${{ runner.os }}-clj-
      - name: Plugin render specs (DB-free)
        run: clojure -M:test:test-runner
      - name: Demo server integration tests (Datomic Local)
        run: clojure -M:demo-server:test:demo-test
      - name: Full-stack demo render tests (Datomic + Pathom + plugin)
        run: clojure -M:demo-server:test:demo-render
